version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env.prod
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - backend_logs:/app/logs
      - backend_backups:/app/backups
    networks:
      - internal
      - edge

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.example.com}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./.env.prod
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.example.com}
    ports:
      - "4173:80"
    networks:
      - edge

volumes:
  postgres_data:
  backend_logs:
  backend_backups:

networks:
  internal:
    driver: bridge
  edge:
    driver: bridge
