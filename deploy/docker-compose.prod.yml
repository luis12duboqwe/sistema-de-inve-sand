services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${PROD_ENV_FILE:-./.env.prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${PROD_ENV_FILE:-./.env.prod}
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - backend_logs:/app/logs
      - backend_backups:/app/backups
      - backend_uploads:/app/uploads
    networks:
      - internal

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ${PROD_ENV_FILE:-./.env.prod}
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - internal
      - edge

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles:
      - backup
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${PROD_ENV_FILE:-./.env.prod}
    volumes:
      - backend_backups:/backups
    command: >
      sh -c 'mkdir -p /backups &&
      while true; do
        ts=$$(date +%Y%m%d_%H%M%S);
        echo "[$$(date -Iseconds)] creando backup /backups/$${POSTGRES_DB}_$${ts}.sql.gz";
        PGPASSWORD="$${POSTGRES_PASSWORD}" pg_dump -h db -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" | gzip > "/backups/$${POSTGRES_DB}_$${ts}.sql.gz";
        find /backups -name "*.sql.gz" -mtime +$${BACKUP_RETENTION_DAYS:-30} -delete;
        sleep $${BACKUP_INTERVAL_SECONDS:-86400};
      done'
    networks:
      - internal

volumes:
  postgres_data:
  backend_logs:
  backend_backups:
  backend_uploads:

networks:
  internal:
    driver: bridge
  edge:
    driver: bridge
