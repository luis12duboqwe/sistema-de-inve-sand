[pytest]
# Evita el warning de pytest-asyncio sobre el scope por defecto del event loop.
asyncio_default_fixture_loop_scope = function

# Mantiene el output de tests limpio: estas advertencias vienen de dependencias
# (Starlette/Passlib/Websockets/Pydantic) y no bloquean funcionalidad.
filterwarnings =
	ignore:The configuration option "asyncio_default_fixture_loop_scope" is unset\.:pytest.PytestDeprecationWarning
	ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning
	ignore:Support for class-based `config` is deprecated, use ConfigDict instead.*:DeprecationWarning
	ignore:'crypt' is deprecated and slated for removal in Python 3\.13:DeprecationWarning
	ignore:websockets\.legacy is deprecated.*:DeprecationWarning
	ignore:websockets\.server\.WebSocketServerProtocol is deprecated:DeprecationWarning
	ignore:Pydantic serializer warnings:UserWarning
